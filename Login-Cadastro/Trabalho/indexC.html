<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="styleC.css">
</head>

<body>

    <div class="pgcentral">
   
        <div class="Alogin">
            <h1>Faça seu Cadastro</h1>

            <form id="Fcadastro">
                <div class="Atexto">

                    <label>E-mail:</label>
                    <input id="E-mail" type="text" placeholder="E-mail">

                    <label>Usuário:</label>
                    <input id="Usuário" type="text" placeholder="Nome de usuário">

                    <label>Matricula (ID):</label>
                    <input id="Matricula" type="text" placeholder="ID">

                    <div class="botoes">
                        <input id="botao" type="submit" value="Cadastrar-se">
                        <input id="listar" type="button" value="Listar">
                    </div>

                </div>
            </form>
        </div>

        <div id="painelUsuarios"></div>

    </div>

    <footer>
        Agradecemos por se cadastrar no nosso site! | Dev: Salem.
    </footer>

    <script src="script.js"></script>

</body>
</html>
